# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# Options
set -g mouse on
set -ga terminal-overrides ",xterm-256color:Tc"

# Catppuccin config
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_modules "application session cpu ram uptime battery"

# Status bar
set -g status-left ""
set -g status-right "#{@catppuccin_status_application} #{@catppuccin_status_cpu} #{@catppuccin_status_ram} #{@catppuccin_status_session} #{@catppuccin_status_uptime} #{@catppuccin_status_battery}"

# TPM (must be last)
run '~/.tmux/plugins/tpm/tpm'
